name: Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Lint code
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run unit tests
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        env:
          CI: true

      - name: Build application
        run: npm run build -- --configuration production

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-summary.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage/

      - name: Comment PR with test summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = './coverage/coverage-summary.json';
            
            let comment = '## Build & Test Results 🧪\n\n';
            comment += '| Check | Status |\n';
            comment += '|-------|--------|\n';
            comment += '| Build | ✓ Passed |\n';
            comment += '| Unit Tests | ✓ Passed |\n';
            
            if (fs.existsSync(coveragePath)) {
              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const total = coverage.total;
              comment += '| Test Coverage | ' + total.lines.pct + '% |\n';
            }
            
            comment += '\n**Artifacts:** Build and coverage reports available in GitHub Actions.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if build failed
        if: failure()
        run: exit 1
