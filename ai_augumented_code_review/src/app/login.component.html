<div class="login-page">
  <form class="login-card" (ngSubmit)="login()">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2e7d32" />
            <stop offset="100%" style="stop-color:#66bb6a" />
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="32" fill="url(#logoGrad)" />
        <polyline points="16,33 27,44 48,22" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span class="logo-text">TodoApp</span>
    </div>
    <h1>Login</h1>
    <p class="hint">Use mock credentials: <strong>demo</strong> / <strong>demo123</strong> or <strong>admin</strong> / <strong>admin123</strong></p>

    <label for="userId">User ID</label>
    <input id="userId" name="userId" type="text" [(ngModel)]="userId" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" [(ngModel)]="password" required />

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <p class="forgot-password"><a href="#" (click)="$event.preventDefault()">Forgot password?</a></p>

    <button type="submit">Login</button>
  </form>
</div>
