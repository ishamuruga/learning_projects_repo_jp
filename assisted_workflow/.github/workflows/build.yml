name: Spring Boot CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  # pull_request:
  #   branches:
  #     - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Package JAR
        run: mvn -B package